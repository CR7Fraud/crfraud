<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="description"
        content="CRFraud presents critical football analysis with data-backed comparisons, controversial moments, and evidence-focused debate." />
    <meta name="theme-color" content="#0b1016" />
    <title>CRFraud</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230b1016'/%3E%3Cpath d='M16 38c5-10 11-16 18-16s13 6 18 16' fill='none' stroke='%234fb4ff' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='22' cy='26' r='4' fill='%23f4c36b'/%3E%3C/svg%3E" />
</head>

<body>
    <div id="root"></div>
    <script type="module">
        const isViteDevServer = Boolean(import.meta.hot);

        const manifestCandidates = ["./manifest.json", "./dist/manifest.json"];

        const injectEntry = (entry, manifestUrl) => {
            if (!entry || !entry.file) {
                throw new Error("Vite manifest entry not found");
            }

            const manifestBaseUrl = new URL(manifestUrl, window.location.href);
            const resolveAssetUrl = (assetPath) => new URL(assetPath, manifestBaseUrl).toString();

            for (const cssFile of entry.css || []) {
                const cssUrl = resolveAssetUrl(cssFile);

                if (document.querySelector(`link[href="${cssUrl}"]`)) {
                    continue;
                }

                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = cssUrl;
                document.head.appendChild(link);
            }

            const script = document.createElement("script");
            script.type = "module";
            script.src = resolveAssetUrl(entry.file);
            document.body.appendChild(script);
        };

        const loadFromManifest = async () => {
            let manifest = null;
            let manifestUrl = null;

            for (const candidateUrl of manifestCandidates) {
                try {
                    const response = await fetch(candidateUrl, { cache: "no-store" });
                    if (!response.ok) {
                        continue;
                    }

                    manifest = await response.json();
                    manifestUrl = candidateUrl;
                    break;
                } catch {
                    // Try the next manifest location.
                }
            }

            if (!manifest) {
                throw new Error("Build manifest not found");
            }

            const entry =
                manifest["src/main.jsx"] ||
                manifest["index.html"] ||
                Object.values(manifest).find((value) => value && value.isEntry);

            injectEntry(entry, manifestUrl);
        };

        if (isViteDevServer) {
            import("/src/main.jsx").catch((error) => {
                console.error(error);
            });
        } else {
            loadFromManifest().catch((error) => {
                console.error(error);
                const root = document.getElementById("root");
                if (root) {
                    root.innerHTML =
                        '<div style="padding:2rem;font-family:sans-serif;color:#fff;background:#0b1016;min-height:100vh">Unable to load the app bundle.</div>';
                }
            });
        }
    </script>
</body>

</html>
